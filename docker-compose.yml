services:
  postgres:
    image: postgres:16-alpine
    container_name: linku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linku
      POSTGRES_PASSWORD: linku_dev_password
      POSTGRES_DB: linku
    ports:
      - "5432:5432"
    volumes:
      - linku-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linku -d linku"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  linku-postgres-data:
